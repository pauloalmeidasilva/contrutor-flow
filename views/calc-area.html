<div class="calc-header">
    <h2 class="calc-title">Calculadora de Área</h2>
    <p class="calc-subtitle">Calcule área para retângulo, triângulo ou círculo com opção de quantidade e margem.</p>
</div>

<div class="card" style="max-width: 760px; margin: 0 auto;">
    <form id="area-form" onsubmit="event.preventDefault();">
        <div class="form-group">
            <label class="form-label" for="tipo-area">Formato</label>
            <select id="tipo-area" class="form-input" required>
                <option value="retangulo" selected>Retângulo</option>
                <option value="triangulo">Triângulo</option>
                <option value="circulo">Círculo</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label id="label-dim-a" class="form-label" for="dim-a">Comprimento (m)</label>
                <input type="number" id="dim-a" class="form-input" step="0.01" min="0.01" placeholder="Ex: 5.00" required>
            </div>
            <div id="grupo-dim-b" class="form-group">
                <label id="label-dim-b" class="form-label" for="dim-b">Largura (m)</label>
                <input type="number" id="dim-b" class="form-input" step="0.01" min="0.01" placeholder="Ex: 3.50" required>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label class="form-label" for="qtde-area">Quantidade</label>
                <input type="number" id="qtde-area" class="form-input" step="1" min="1" value="1" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="margem-area">Margem de segurança (%)</label>
                <input type="number" id="margem-area" class="form-input" step="0.1" min="0" value="0" required>
            </div>
        </div>

        <button type="submit" id="btn-calcular-area" class="btn-primary">Calcular Área</button>
    </form>

    <div id="resultado-area" class="result-box">
        <div class="result-title">Área Total</div>
        <div id="res-area-total" class="result-value">0,00 m²</div>
        <p id="res-area-detalhe" style="font-size: 0.9rem; color: #166534; margin-top: 8px;"></p>
        <p id="res-area-margem" style="font-size: 0.85rem; color: #166534; margin-top: 8px;"></p>
    </div>
</div>
