<div class="calc-header">
    <h2 class="calc-title">Calculadora de Sapata Isolada</h2>
    <p class="calc-subtitle">Informe as dimensões da sapata e a quantidade de blocos para calcular o volume total de concreto.</p>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start;">
    <div class="card">
        <form id="sapata-isolada-form" onsubmit="event.preventDefault();">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label class="form-label" for="comprimento-sapata-isolada">Comprimento (m)</label>
                    <input type="number" id="comprimento-sapata-isolada" class="form-input" step="0.01" min="0.01" placeholder="Ex: 1.20" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="largura-sapata-isolada">Largura (m)</label>
                    <input type="number" id="largura-sapata-isolada" class="form-input" step="0.01" min="0.01" placeholder="Ex: 1.20" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="altura-sapata-isolada">Altura (m)</label>
                    <input type="number" id="altura-sapata-isolada" class="form-input" step="0.01" min="0.01" placeholder="Ex: 0.50" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="quantidade-sapata-isolada">Quantidade</label>
                    <input type="number" id="quantidade-sapata-isolada" class="form-input" step="1" min="1" value="1" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 6px;">
                Calcular Volume
            </button>
        </form>
    </div>

    <div>
        <div id="resultado-sapata-isolada" class="result-box" style="margin-top: 0; display: none;">
            <div class="result-title">Volume de Concreto</div>
            <div id="valor-resultado-sapata-isolada" class="result-value">0,000 m³</div>
            <p id="info-resultado-sapata-isolada" style="font-size: 0.85rem; color: #166534; margin-top: 8px;"></p>
        </div>

        <button id="btn-materiais-sapata-isolada" type="button" class="btn-primary" style="margin-top: 16px; display: none;" onclick="app.loadView('calc-concreto')">
            Calcular materiais
        </button>

        <div class="card" style="margin-top: 16px; background-color: #fef3c7; border: 1px solid #fde68a; color: #78350f; padding: 16px; font-size: 0.85rem; line-height: 1.5;">
            <strong>💡 Dica:</strong> Verifique se as medidas informadas estão em metros para manter o volume calculado corretamente em m³.
        </div>
    </div>
</div>
