<div class="calc-header">
    <h2 class="calc-title">Calculadora de Degraus de Escada</h2>
    <p class="calc-subtitle">Informe altura e comprimento do lance para calcular quantidade de degraus, espelho e piso pela fórmula de Blondel.</p>
</div>

<div class="card" style="max-width: 760px; margin: 0 auto;">
    <form id="degraus-escada-form" onsubmit="event.preventDefault();">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
                <label class="form-label" for="altura-total-escada">Altura total da escada (m)</label>
                <input type="number" id="altura-total-escada" class="form-input" step="0.01" min="0.1" placeholder="Ex: 2.80" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="comprimento-escada">Comprimento do lance (m)</label>
                <input type="number" id="comprimento-escada" class="form-input" step="0.01" min="0.2" placeholder="Ex: 4.20" required>
            </div>
        </div>

        <button type="submit" id="btn-calcular-degraus" class="btn-primary">Calcular Degraus</button>
    </form>

    <div id="resultado-degraus-escada" class="result-box">
        <div class="result-title">Dimensionamento (Blondel)</div>
        <div id="res-degraus-principal" class="result-value">0 degraus</div>
        <p id="res-degraus-detalhe" style="font-size: 0.9rem; color: #166534; margin-top: 8px;"></p>
        <p id="res-degraus-conforto" style="font-size: 0.85rem; color: #166534; margin-top: 8px;"></p>
    </div>

    <div class="card" style="margin-top: 16px; background-color: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; padding: 16px; font-size: 0.85rem; line-height: 1.5;">
        <strong>Fórmula de Blondel:</strong> 2E + P = 63 cm, onde E é o espelho e P é o piso.
    </div>
</div>
