<div class="calc-header">
    <h2 class="calc-title">Calculadora de Escada em Concreto</h2>
    <p class="calc-subtitle">Informe os dados da escada para estimar o volume de concreto dos degraus.</p>
</div>

<div class="card" style="max-width: 760px; margin: 0 auto;">
    <form id="escada-concreto-form" onsubmit="event.preventDefault();">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="form-group">
                <label class="form-label" for="num-degraus-concreto">Número de degraus</label>
                <input type="number" id="num-degraus-concreto" class="form-input" step="1" min="1" placeholder="Ex: 16" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="largura-escada-concreto">Largura da escada (m)</label>
                <input type="number" id="largura-escada-concreto" class="form-input" step="0.01" min="0.1" placeholder="Ex: 1.20" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="piso-escada-concreto">Piso (cm)</label>
                <input type="number" id="piso-escada-concreto" class="form-input" step="0.1" min="1" placeholder="Ex: 28" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="espelho-escada-concreto">Espelho (cm)</label>
                <input type="number" id="espelho-escada-concreto" class="form-input" step="0.1" min="1" placeholder="Ex: 17" required>
            </div>
        </div>

        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; margin-bottom: 10px;">
            Não sabe o dimensionamento?
            <button type="button" class="link-btn" onclick="app.loadView('calc-degraus-escada')">Calcule os degraus pela fórmula de Blondel →</button>
        </p>

        <button type="submit" id="btn-calcular-escada-concreto" class="btn-primary">Calcular Volume</button>
    </form>

    <div id="resultado-escada-concreto" class="result-box">
        <div class="result-title">Volume de Concreto</div>
        <div id="res-volume-escada-concreto" class="result-value">0,000 m³</div>
        <p id="res-detalhe-escada-concreto" style="font-size: 0.9rem; color: #166534; margin-top: 8px;"></p>
    </div>
</div>
